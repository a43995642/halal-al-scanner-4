
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./icon.png?v=3" />
    <link rel="apple-touch-icon" href="./icon.png?v=3">
    <!-- Viewport: Prevent zooming and handle notch area -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Halal Scanner">

    <title>Halal AI Scanner</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
      // Global Error Handler for startup issues
      window.onerror = function(message, source, lineno, colno, error) {
        var msgStr = typeof message === 'string' ? message : (message && message.type ? message.type : String(message));
        if (msgStr === 'Script error.' || msgStr === 'error') return;
        console.error("Global Error:", message);
        var loader = document.querySelector('.initial-loader');
        if(loader) {
           loader.innerHTML = '<div style="color:#ef4444; padding:20px; text-align:center; direction:ltr; font-family:sans-serif;">' +
                              '<h3 style="font-size:18px; font-weight:bold; margin-bottom:10px;">Startup Error</h3>' + 
                              '<p style="font-size:12px; opacity:0.8; margin-bottom:20px;">' + msgStr + '</p>' + 
                              '<button onclick="window.location.reload()" style="background:#fff; color:#000; padding:12px 24px; border-radius:99px; font-weight:bold; border:none; cursor:pointer;">Reload App</button>' +
                              '</div>';
        }
      };
    </script>
  </head>
  <body class="bg-black text-slate-100">
    <div id="root"></div>
    <!-- Standard Vite/Capacitor module import -->
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
